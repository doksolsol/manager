<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사진 합성 도구 - 세로 실외기실</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .photo-slot {
            background-color: #f3f4f6;
            border: 2px dashed #d1d5db;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border-radius: 0.5rem;
            cursor: pointer;
        }
        .slot-16-9 { aspect-ratio: 16 / 9; }
        .slot-9-16 { aspect-ratio: 9 / 16; width: 60%; margin: 0 auto; }
        
        .photo-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .slot-label {
            position: absolute;
            bottom: 4px;
            right: 8px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 2px 8px;
            font-size: 11px;
            border-radius: 4px;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-10">
    <div class="max-w-md mx-auto p-4">
        <header class="mb-4 text-center">
            <h1 class="text-xl font-bold text-gray-800">현장 사진 합치기</h1>
            <p class="text-xs text-gray-500">실외기실은 세로 사진을 선택하세요</p>
        </header>

        <!-- 입력 섹션 (숫자 패드 최적화) -->
        <div class="grid grid-cols-2 gap-3 mb-6 bg-white p-4 rounded-xl shadow-sm">
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">동</label>
                <input type="number" id="dong" pattern="\d*" placeholder="000" class="w-full border rounded-lg p-3 text-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">호수</label>
                <input type="number" id="ho" pattern="\d*" placeholder="000" class="w-full border rounded-lg p-3 text-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
        </div>

        <!-- 가로 사진 (16:9) -->
        <div class="grid grid-cols-2 gap-2 mb-2">
            <div class="photo-slot slot-16-9" onclick="triggerInput('file-room3')">
                <span id="text-room3" class="text-gray-400 text-sm italic">방 3</span>
                <img id="img-room3" class="hidden">
                <span class="slot-label">방 3 (가로)</span>
            </div>
            <div class="photo-slot slot-16-9" onclick="triggerInput('file-room2')">
                <span id="text-room2" class="text-gray-400 text-sm italic">방 2</span>
                <img id="img-room2" class="hidden">
                <span class="slot-label">방 2 (가로)</span>
            </div>
            <div class="photo-slot slot-16-9" onclick="triggerInput('file-living')">
                <span id="text-living" class="text-gray-400 text-sm italic">거실</span>
                <img id="img-living" class="hidden">
                <span class="slot-label">거실 (가로)</span>
            </div>
            <div class="photo-slot slot-16-9" onclick="triggerInput('file-room1')">
                <span id="text-room1" class="text-gray-400 text-sm italic">방 1</span>
                <img id="img-room1" class="hidden">
                <span class="slot-label">방 1 (가로)</span>
            </div>
        </div>

        <!-- 세로 사진 (9:16) -->
        <div class="mb-6 text-center">
            <div class="photo-slot slot-9-16" onclick="triggerInput('file-ac')">
                <span id="text-ac" class="text-gray-400 text-sm italic">실외기실 (세로 사진)</span>
                <img id="img-ac" class="hidden">
                <span class="slot-label">실외기실 (세로)</span>
            </div>
        </div>

        <!-- 숨겨진 인풋 -->
        <input type="file" id="file-room3" accept="image/*" class="hidden" onchange="handleImage(this, 'room3')">
        <input type="file" id="file-room2" accept="image/*" class="hidden" onchange="handleImage(this, 'room2')">
        <input type="file" id="file-living" accept="image/*" class="hidden" onchange="handleImage(this, 'living')">
        <input type="file" id="file-room1" accept="image/*" class="hidden" onchange="handleImage(this, 'room1')">
        <input type="file" id="file-ac" accept="image/*" class="hidden" onchange="handleImage(this, 'ac')">

        <button onclick="generateImage()" class="w-full bg-slate-800 text-white font-bold py-4 rounded-xl shadow-lg active:bg-black transition-colors mb-4">
            이미지 합치기 및 다운로드
        </button>

        <canvas id="resultCanvas" class="hidden"></canvas>
    </div>

    <script>
        const images = { room3: null, room2: null, living: null, room1: null, ac: null };

        function triggerInput(id) { document.getElementById(id).click(); }

        function handleImage(input, key) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imgElement = document.getElementById(`img-${key}`);
                    const textElement = document.getElementById(`text-${key}`);
                    imgElement.src = e.target.result;
                    imgElement.classList.remove('hidden');
                    textElement.classList.add('hidden');
                    
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => { images[key] = img; };
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function generateImage() {
            const dong = document.getElementById('dong').value || '000';
            const ho = document.getElementById('ho').value || '000';
            
            if (!images.room3 || !images.room2 || !images.living || !images.room1 || !images.ac) {
                alert('모든 사진을 등록해주세요.');
                return;
            }

            const canvas = document.getElementById('resultCanvas');
            const ctx = canvas.getContext('2d');

            // 규격 정의
            const landscapeW = 1280;
            const landscapeH = 720;
            const portraitW = 720;  // 실외기실 너비
            const portraitH = 1280; // 실외기실 높이
            const padding = 50;
            const headerH = 180;

            // 전체 캔버스 사이즈 계산
            canvas.width = (landscapeW * 2) + (padding * 3);
            // 헤더 + 가로사진 2줄 + 세로사진 1줄 + 패딩
            canvas.height = headerH + (landscapeH * 2) + portraitH + (padding * 5);

            // 배경 그리기
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 텍스트 스타일
            ctx.fillStyle = '#111827';
            ctx.font = 'bold 70px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(`${dong}동 ${ho}호 점검 리포트`, canvas.width / 2, 110);

            const drawWithLabel = (img, x, y, w, h, label) => {
                ctx.drawImage(img, x, y, w, h);
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(x, y + h - 70, 240, 70);
                ctx.fillStyle = '#ffffff';
                ctx.font = '40px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(label, x + 120, y + h - 22);
            };

            // 가로 사진 1행
            drawWithLabel(images.room3, padding, headerH + padding, landscapeW, landscapeH, "방 3");
            drawWithLabel(images.room2, padding * 2 + landscapeW, headerH + padding, landscapeW, landscapeH, "방 2");

            // 가로 사진 2행
            drawWithLabel(images.living, padding, headerH + padding * 2 + landscapeH, landscapeW, landscapeH, "거실");
            drawWithLabel(images.room1, padding * 2 + landscapeW, headerH + padding * 2 + landscapeH, landscapeW, landscapeH, "방 1");

            // 세로 사진 3행 (중앙 정렬)
            const acX = (canvas.width - portraitW) / 2;
            const acY = headerH + padding * 3 + landscapeH * 2;
            drawWithLabel(images.ac, acX, acY, portraitW, portraitH, "실외기실");

            // 파일 다운로드
            try {
                const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
                const link = document.createElement('a');
                link.download = `${dong}동_${ho}호_점검완료.jpg`;
                link.href = dataUrl;
                link.click();
            } catch (e) {
                alert("이미지 생성 중 오류가 발생했습니다. 브라우저 권한을 확인하세요.");
            }
        }
    </script>
</body>
</html>
