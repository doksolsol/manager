<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Photo Merger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .photo-slot {
            background-color: #f3f4f6;
            border: 2px dashed #d1d5db;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border-radius: 0.5rem;
            cursor: pointer;
        }
        .slot-16-9 { aspect-ratio: 16 / 9; }
        .slot-portrait-container { aspect-ratio: 9 / 20.5; }
        
        .photo-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .slot-label {
            position: absolute;
            bottom: 4px;
            right: 8px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 2px 8px;
            font-size: 11px;
            border-radius: 4px;
            pointer-events: none;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        /* 모달 스타일 */
        #resultModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 50;
            padding: 20px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10 font-sans">
    <div class="max-w-md mx-auto p-4">
        <header class="mb-6 text-center pt-4">
            <h1 class="text-3xl font-black text-slate-900 tracking-tight">PHOTO MERGER</h1>
            <p class="text-sm text-slate-500 font-medium">에어컨 설치 현장 정리 도구</p>
        </header>

        <!-- 입력 섹션 -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mb-8">
            <div class="flex items-center justify-between gap-4">
                <div class="flex-1">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Building (동)</label>
                    <input type="number" id="dong" pattern="\d*" inputmode="numeric" placeholder="101" class="w-full bg-slate-50 border-none rounded-xl p-4 text-2xl font-bold text-slate-800 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="text-2xl font-black text-slate-300 mt-5">-</div>
                <div class="flex-1">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Unit (호)</label>
                    <input type="number" id="ho" pattern="\d*" inputmode="numeric" placeholder="1001" class="w-full bg-slate-50 border-none rounded-xl p-4 text-2xl font-bold text-slate-800 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>
        </div>

        <!-- 사진 배치 영역 -->
        <div class="flex gap-2 mb-8">
            <div class="w-2/3 grid grid-cols-1 gap-2">
                <div class="grid grid-cols-2 gap-2">
                    <div class="photo-slot slot-16-9" onclick="triggerInput('file-room3')">
                        <span id="text-room3" class="text-slate-400 text-xs font-bold text-center">방 3<br>(가로)</span>
                        <img id="img-room3" class="hidden">
                        <span class="slot-label">방 3</span>
                    </div>
                    <div class="photo-slot slot-16-9" onclick="triggerInput('file-room2')">
                        <span id="text-room2" class="text-slate-400 text-xs font-bold text-center">방 2<br>(가로)</span>
                        <img id="img-room2" class="hidden">
                        <span class="slot-label">방 2</span>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div class="photo-slot slot-16-9" onclick="triggerInput('file-living')">
                        <span id="text-living" class="text-slate-400 text-xs font-bold text-center">거실<br>(가로)</span>
                        <img id="img-living" class="hidden">
                        <span class="slot-label">거실</span>
                    </div>
                    <div class="photo-slot slot-16-9" onclick="triggerInput('file-room1')">
                        <span id="text-room1" class="text-slate-400 text-xs font-bold text-center">방 1<br>(가로)</span>
                        <img id="img-room1" class="hidden">
                        <span class="slot-label">방 1</span>
                    </div>
                </div>
            </div>
            <div class="w-1/3">
                <div class="photo-slot h-full slot-portrait-container" onclick="triggerInput('file-ac')">
                    <span id="text-ac" class="text-slate-400 text-xs font-bold text-center px-2">실외기<br>(세로)</span>
                    <img id="img-ac" class="hidden">
                    <span class="slot-label">실외기</span>
                </div>
            </div>
        </div>

        <!-- 숨겨진 인풋 -->
        <input type="file" id="file-room3" accept="image/*" class="hidden" onchange="handleImage(this, 'room3')">
        <input type="file" id="file-room2" accept="image/*" class="hidden" onchange="handleImage(this, 'room2')">
        <input type="file" id="file-living" accept="image/*" class="hidden" onchange="handleImage(this, 'living')">
        <input type="file" id="file-room1" accept="image/*" class="hidden" onchange="handleImage(this, 'room1')">
        <input type="file" id="file-ac" accept="image/*" class="hidden" onchange="handleImage(this, 'ac')">

        <button onclick="generateImage()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-xl active:scale-[0.98] transition-all text-lg uppercase tracking-wider">
            이미지 생성하기
        </button>

        <canvas id="resultCanvas" class="hidden"></canvas>
    </div>

    <!-- 결과 확인 모달 -->
    <div id="resultModal" onclick="closeModal()">
        <p class="text-white mb-4 text-center font-bold">이미지를 길게 눌러 <br> '사진 앱에 저장' 하세요</p>
        <img id="finalPreview" class="max-w-full max-h-[70vh] rounded-lg shadow-2xl border-4 border-white">
        <button class="mt-8 bg-white text-black px-8 py-3 rounded-full font-bold">닫기</button>
    </div>

    <script>
        const images = { room3: null, room2: null, living: null, room1: null, ac: null };

        function triggerInput(id) { document.getElementById(id).click(); }

        function handleImage(input, key) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imgElement = document.getElementById(`img-${key}`);
                    const textElement = document.getElementById(`text-${key}`);
                    imgElement.src = e.target.result;
                    imgElement.classList.remove('hidden');
                    textElement.classList.add('hidden');
                    
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => { images[key] = img; };
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function closeModal() {
            document.getElementById('resultModal').style.display = 'none';
        }

        function generateImage() {
            const dong = document.getElementById('dong').value || '---';
            const ho = document.getElementById('ho').value || '---';
            
            if (!Object.values(images).every(img => img !== null)) {
                alert('5장의 사진을 모두 선택해주세요.');
                return;
            }

            const canvas = document.getElementById('resultCanvas');
            const ctx = canvas.getContext('2d');

            const landscapeW = 1280;
            const landscapeH = 720;
            const padding = 60;
            const headerH = 280; 

            const portraitH = (landscapeH * 2) + padding;
            const portraitW = (portraitH * 9) / 16; 

            canvas.width = (landscapeW * 2) + portraitW + (padding * 4);
            canvas.height = headerH + (landscapeH * 2) + (padding * 3);

            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 헤더 텍스트 (버그 수정: font 가중치 숫자로 변경)
            ctx.textAlign = 'left';
            
            // 동 숫자
            ctx.fillStyle = '#0f172a';
            ctx.font = '900 160px sans-serif';
            ctx.fillText(dong, padding, 180);
            
            // "동" 텍스트
            const dongNumWidth = ctx.measureText(dong).width;
            ctx.fillStyle = '#64748b';
            ctx.font = '700 80px sans-serif';
            ctx.fillText('동', padding + dongNumWidth + 20, 180);

            // 호 숫자
            const hoStartPos = padding + dongNumWidth + 180;
            ctx.fillStyle = '#0f172a';
            ctx.font = '900 160px sans-serif';
            ctx.fillText(ho, hoStartPos, 180);
            
            // "호 에어컨" 텍스트
            const hoNumWidth = ctx.measureText(ho).width;
            ctx.fillStyle = '#64748b';
            ctx.font = '700 80px sans-serif';
            ctx.fillText('호 에어컨', hoStartPos + hoNumWidth + 20, 180);

            // 구분선
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 10;
            ctx.beginPath();
            ctx.moveTo(padding, 240);
            ctx.lineTo(canvas.width - padding, 240);
            ctx.stroke();

            const drawWithLabel = (img, x, y, w, h, label) => {
                ctx.drawImage(img, x, y, w, h);
                ctx.fillStyle = 'rgba(15, 23, 42, 0.85)';
                ctx.fillRect(x, y, 220, 80);
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 40px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(label, x + 110, y + 55);
            };

            const startY = headerH + padding;

            // 사진 배치
            drawWithLabel(images.room3, padding, startY, landscapeW, landscapeH, "방 3");
            drawWithLabel(images.living, padding, startY + landscapeH + padding, landscapeW, landscapeH, "거실");

            const col2X = padding * 2 + landscapeW;
            drawWithLabel(images.room2, col2X, startY, landscapeW, landscapeH, "방 2");
            drawWithLabel(images.room1, col2X, startY + landscapeH + padding, landscapeW, landscapeH, "방 1");

            const col3X = padding * 3 + landscapeW * 2;
            drawWithLabel(images.ac, col3X, startY, portraitW, portraitH, "실외기");

            // 최종 미리보기 모달 띄우기 (사진 앱 저장 대응)
            const finalImage = canvas.toDataURL('image/jpeg', 0.95);
            document.getElementById('finalPreview').src = finalImage;
            document.getElementById('resultModal').style.display = 'flex';
        }
    </script>
</body>
</html>
